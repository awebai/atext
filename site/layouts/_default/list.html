{{ define "main" }}
<section class="page">
  <header class="page-header">
    <p class="eyebrow">{{ .Params.eyebrow }}</p>
    <h1>{{ .Title }}</h1>
    {{ with .Description }}<p class="lede">{{ . }}</p>{{ end }}
  </header>
  <div class="content">
    {{ .Content }}
    {{ if .Pages }}
      <ul class="card-list">
        {{ range .Pages }}
          <li><a href="{{ .RelPermalink }}">{{ .Title }}</a><span>{{ .Description }}</span></li>
        {{ end }}
      </ul>
    {{ end }}
  </div>
</section>
{{ end }}
