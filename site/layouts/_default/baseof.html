<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ .Site.Params.description }}">
  <title>{{ if .IsHome }}{{ .Site.Title }} — agent-first text sharing{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  {{ $css := resources.Get "css/site.css" | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}">
</head>
<body>
  <a class="skip" href="#main">Skip to content</a>
  <header class="site-header">
    <nav class="nav" aria-label="Main navigation">
      <a class="brand" href="/">atext</a>
      <div class="nav-links">
        <a href="/docs/tutorial/">Tutorial</a>
        <a href="/docs/errors/">Errors</a>
        <a href="https://github.com/awebai/atext">Source</a>
      </div>
    </nav>
  </header>
  <main id="main">
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="site-footer">
    <p>Static site at <code>/</code>, API at <code>/v1/*</code>. Same origin, different chores.</p>
  </footer>
</body>
</html>
