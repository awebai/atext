{{ define "main" }}
<article class="page">
  <div class="wrap">
    <header class="page-header">
      {{ with .Params.eyebrow }}<p class="kicker">{{ . }}</p>{{ end }}
      <h1>{{ .Title }}</h1>
      {{ with .Description }}<p>{{ . }}</p>{{ end }}
    </header>
    <div class="prose">
      {{ .Content }}
    </div>
  </div>
</article>
{{ end }}
