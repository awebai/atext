services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atext
      POSTGRES_PASSWORD: atext
      POSTGRES_DB: atext
    ports:
      - "${ATEXT_E2E_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atext -d atext"]
      interval: 2s
      timeout: 5s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 30

  awid:
    build:
      context: ${ATEXT_E2E_AWEB_CONTEXT:-../aweb}
      dockerfile: awid/Dockerfile
    environment:
      AWID_DATABASE_URL: postgresql://atext:atext@postgres:5432/atext
      AWID_REDIS_URL: redis://redis:6379/0
      AWID_HOST: 0.0.0.0
      AWID_PORT: 8010
      AWID_DB_SCHEMA: awid
      AWID_LOG_JSON: "false"
      AWID_RATE_LIMIT_BACKEND: redis
      AWID_RATE_LIMIT_DISABLED: "true"
      AWID_SKIP_DNS_VERIFY: "1"
    ports:
      - "${ATEXT_E2E_AWID_PORT:-18010}:8010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 2s
      timeout: 5s
      start_period: 5s
      retries: 30
